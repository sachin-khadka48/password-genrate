<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Password Generator</h1>
        <label for="length">Password Length:</label>
        <select id="length">
            <option value="8">8 characters</option>
            <option value="12">12 characters</option>
            <option value="16">16 characters</option>
        </select>

        <div>
            <label><input type="checkbox" id="uppercase"> Include Uppercase Letters</label>
            <label><input type="checkbox" id="lowercase" checked> Include Lowercase Letters</label>
            <label><input type="checkbox" id="numbers"> Include Numbers</label>
            <label><input type="checkbox" id="special"> Include Special Characters</label>
        </div>

        <button id="generate">Generate Password</button>
        <button id="copy">Copy Password</button>

        <h2>Generated Password:</h2>
        <p id="passwordDisplay"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
